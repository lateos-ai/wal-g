name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.23'
    - name: Build binaries
      run: |
        mkdir -p dist
        GOOS=linux GOARCH=amd64 go build -o dist/wal-g-linux-amd64 .
        GOOS=linux GOARCH=arm64 go build -o dist/wal-g-linux-arm64 .
        GOOS=darwin GOARCH=amd64 go build -o dist/wal-g-darwin-amd64 .
        GOOS=darwin GOARCH=arm64 go build -o dist/wal-g-darwin-arm64 .
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
